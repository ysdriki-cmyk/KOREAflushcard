  // ===== ユーティリティ =====
  function shuffleArray(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function speak(text, lang) {
    if (!("speechSynthesis" in window)) {
      alert("このブラウザは音声読み上げに対応していません。");
      return;
    }
    const synth = window.speechSynthesis;
    synth.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = lang;
    synth.speak(utter);
  }

  // 単語が含まれる例文を1つ探す（だいたいのマッチでOKなゆるいルール）
  function findExampleForWord(koWord) {
    let base = koWord.split("/")[0].trim();
    if (base.endsWith("다")) {
      base = base.slice(0, base.length - 1);
    }
    for (const ph of PHRASES) {
      if (ph.ko.includes(base)) {
        return ph;
      }
    }
    return null;
  }

  // ===== DOM 取得 =====
  const koWordEl        = document.getElementById("koWord");
  const optionsEl       = document.getElementById("options");
  const resultEl        = document.getElementById("result");
  const correctAnswerEl = document.getElementById("correctAnswer");
  const exKoEl          = document.getElementById("exKo");
  const exEnEl          = document.getElementById("exEn");
  const exJpEl          = document.getElementById("exJp");
  const exSpeakKoBtn    = document.getElementById("exSpeakKo"); // ★ 追加

  const qIndexEl        = document.getElementById("qIndex");
  const qTotalEl        = document.getElementById("qTotal");
  const nextBtn         = document.getElementById("nextBtn");
  const prevBtn         = document.getElementById("prevBtn");
  const speakKoBtn      = document.getElementById("speakKo");
  const speakEnBtn      = document.getElementById("speakEn");

  const modeOrderBtn    = document.getElementById("modeOrderBtn");
  const modeShuffleBtn  = document.getElementById("modeShuffleBtn");

  qTotalEl.textContent = WORDS.length.toString();

  // いま画面に表示している例文（韓国語）のテキストを保持
  let currentExampleKo = "";

  // ===== 出題順管理（順番 / シャッフル） =====
  let mode = "order";    // "order" or "shuffle"
  let deck = [];         // 出題順（インデックスの配列）
  let pos = 0;           // deck の中で今どこか

  function buildDeck() {
    deck = [...Array(WORDS.length).keys()];
    if (mode === "shuffle") {
      shuffleArray(deck);
    }
    pos = 0;
  }

  function updateModeButtons() {
    if (mode === "order") {
      modeOrderBtn.classList.add("mode-active");
      modeOrderBtn.classList.remove("mode-inactive");
      modeShuffleBtn.classList.add("mode-inactive");
      modeShuffleBtn.classList.remove("mode-active");
    } else {
      modeShuffleBtn.classList.add("mode-active");
      modeShuffleBtn.classList.remove("mode-inactive");
      modeOrderBtn.classList.add("mode-inactive");
      modeOrderBtn.classList.remove("mode-active");
    }
  }

  function getCurrentIndex() {
    return deck[pos];
  }

  // ===== 画面表示 =====
  function buildOptions() {
    const currentIndex = getCurrentIndex();
    const data = WORDS[currentIndex];
    const correctText = data.en;

    const candidates = [];
    for (let i = 0; i < WORDS.length; i++) {
      if (i !== currentIndex) candidates.push(i);
    }
    shuffleArray(candidates);
    const wrongIndices = candidates.slice(0, 5);

    const options = [{ text: correctText, correct: true }];
    wrongIndices.forEach(idx => {
      options.push({ text: WORDS[idx].en, correct: false });
    });
    shuffleArray(options);

    optionsEl.innerHTML = "";
    options.forEach(opt => {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "mc-option";
      btn.textContent = opt.text;
      btn.dataset.correct = opt.correct ? "true" : "false";
      btn.addEventListener("click", () => handleChoice(btn));
      optionsEl.appendChild(btn);
    });
  }

  function showQuestion(clear = true) {
    const currentIndex = getCurrentIndex();
    const data = WORDS[currentIndex];
    koWordEl.textContent = data.ko;
    qIndexEl.textContent = (pos + 1).toString();

    if (clear) {
      resultEl.textContent = "";
      resultEl.className = "result";
      correctAnswerEl.textContent = "";
      exKoEl.textContent = "";
      exEnEl.textContent = "";
      exJpEl.textContent = "";
      currentExampleKo = "";  // 例文リセット
    }

    buildOptions();
  }

  // ===== 解答処理 =====
  function handleChoice(btn) {
    const isCorrect = btn.dataset.correct === "true";
    const currentIndex = getCurrentIndex();

    if (isCorrect) {
      resultEl.textContent = "✅ 正解！";
      resultEl.className = "result correct";
    } else {
      resultEl.textContent = "❌ 不正解…";
      resultEl.className = "result incorrect";
    }
    const correctText = WORDS[currentIndex].en;
    correctAnswerEl.textContent = "正解：" + correctText;

    const allBtns = optionsEl.querySelectorAll(".mc-option");
    allBtns.forEach(b => {
      b.disabled = true;
      if (b.dataset.correct === "true") {
        b.classList.add("correct-choice");
      } else if (b === btn && !isCorrect) {
        b.classList.add("wrong-choice");
      }
    });

    const wordKo = WORDS[currentIndex].ko;
    const example = findExampleForWord(wordKo);
    if (example) {
      exKoEl.textContent = example.ko;
      exEnEl.textContent = example.en;
      exJpEl.textContent = example.jp;
      currentExampleKo = example.ko;
    } else {
      exKoEl.textContent = "(この単語を含む例文はまだ登録していません)";
      exEnEl.textContent = "";
      exJpEl.textContent = "";
      currentExampleKo = "";
    }
  }

  // ===== ナビゲーション =====
  nextBtn.addEventListener("click", () => {
    pos++;
    if (pos >= deck.length) {
      pos = 0;
    }
    showQuestion(true);
  });

  prevBtn.addEventListener("click", () => {
    pos--;
    if (pos < 0) {
      pos = deck.length - 1;
    }
    showQuestion(true);
  });

  // ===== TTSボタン =====
  speakKoBtn.addEventListener("click", () => {
    const currentIndex = getCurrentIndex();
    speak(WORDS[currentIndex].ko, "ko-KR");
  });

  speakEnBtn.addEventListener("click", () => {
    const currentIndex = getCurrentIndex();
    speak(WORDS[currentIndex].en, "en-US");
  });

  // ★ 例文の韓国語TTS
  exSpeakKoBtn.addEventListener("click", () => {
    if (currentExampleKo) {
      speak(currentExampleKo, "ko-KR");
    }
  });

  // ===== モード切替 =====
  modeOrderBtn.addEventListener("click", () => {
    if (mode !== "order") {
      mode = "order";
      updateModeButtons();
      buildDeck();
      showQuestion(true);
    } else {
      buildDeck();
      showQuestion(true);
    }
  });

  modeShuffleBtn.addEventListener("click", () => {
    if (mode !== "shuffle") {
      mode = "shuffle";
      updateModeButtons();
      buildDeck();
      showQuestion(true);
    } else {
      buildDeck();
      showQuestion(true);
    }
  });

  // ===== 初期化 =====
  buildDeck();
  updateModeButtons();
  showQuestion(true);
</script>
